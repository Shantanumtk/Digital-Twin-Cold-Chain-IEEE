# =============================================================================
# Kafka ConfigMap — Cold Chain Digital Twin
# Updated (Phase 2/5): added coldchain.ground.truth, NUM_PARTITIONS=5
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: coldchain
data:
  KAFKA_NODE_ID: "1"
  KAFKA_PROCESS_ROLES: "controller,broker"
  KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
  KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
  KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  # Phase 5: 5 partitions enables 5x throughput for scale test
  KAFKA_NUM_PARTITIONS: "5"
  KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
  KAFKA_LOG_RETENTION_HOURS: "168"
  KAFKA_LOG_SEGMENT_BYTES: "1073741824"
  # Phase 2: topics list (used by deploy-script.sh and create-topics-job.yaml)
  KAFKA_TOPICS: >-
    coldchain.telemetry.trucks,
    coldchain.telemetry.rooms,
    coldchain.alerts,
    coldchain.ground.truth
